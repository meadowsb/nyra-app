<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1200" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="mc-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8eef5"/>
      <stop offset="42%" stop-color="#d4dce8"/>
      <stop offset="100%" stop-color="#b8c4d4"/>
    </linearGradient>
    <linearGradient id="mc-glass" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#f6f8fb" stop-opacity="0.92"/>
      <stop offset="50%" stop-color="#dfe6f0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c5d0e0" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="mc-floor" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#aeb8c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8a95a8" stop-opacity="0.45"/>
    </linearGradient>
    <filter id="mc-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>
  <rect width="960" height="1200" fill="url(#mc-sky)"/>
  <!-- Distant skyline wash -->
  <rect x="0" y="680" width="960" height="520" fill="url(#mc-floor)"/>
  <ellipse cx="480" cy="420" rx="420" ry="180" fill="#c8d6e8" opacity="0.35" filter="url(#mc-blur)"/>
  <!-- Abstract towers -->
  <rect x="120" y="320" width="88" height="520" rx="4" fill="#9aa8bc" opacity="0.28"/>
  <rect x="230" y="240" width="110" height="600" rx="4" fill="#8b9ab0" opacity="0.32"/>
  <rect x="360" y="400" width="72" height="440" rx="3" fill="#a0aec0" opacity="0.22"/>
  <rect x="450" y="180" width="140" height="660" rx="5" fill="#7d8fa6" opacity="0.38"/>
  <rect x="620" y="300" width="95" height="540" rx="4" fill="#95a3b8" opacity="0.26"/>
  <rect x="740" y="360" width="120" height="480" rx="4" fill="#8898b0" opacity="0.3"/>
  <!-- Glass reflection panel -->
  <path d="M60 200 L420 160 L380 920 L40 980 Z" fill="url(#mc-glass)"/>
  <path d="M520 140 L900 220 L860 1000 L480 900 Z" fill="url(#mc-glass)" opacity="0.5"/>
  <!-- Horizon line -->
  <line x1="0" y1="678" x2="960" y2="672" stroke="#fff" stroke-opacity="0.12" stroke-width="2"/>
</svg>
